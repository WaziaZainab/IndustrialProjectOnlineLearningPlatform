{% extends "base.html" %}
{% block content %}

<div class="upload-wrapper">

  <div class="upload-glass">

    <h3 class="upload-heading">🚀 Upload a Video</h3>

    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">

      <div class="mb-3">
        <label class="form-label">Video Title</label>
        <input type="text" class="form-control upload-input" name="title" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <input type="text" class="form-control upload-input" name="category" required>
      </div>

      <div class="mb-3">
        <label class="form-label">YouTube Embed URL</label>
        <input type="text" class="form-control upload-input" name="youtube_url"
        placeholder="https://www.youtube.com/embed/...">
      </div>

      <div class="mb-3">
        <label class="form-label">Upload Local Video (.mp4)</label>
        <input type="file" class="form-control upload-input" name="video_file" accept="video/mp4">
      </div>

      <button type="submit" class="upload-btn">Upload Video</button>

    </form>

  </div>

</div>

{% endblock %}
