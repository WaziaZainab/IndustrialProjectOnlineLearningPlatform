{% extends 'base.html' %}

{% block content %}
  <h3>{{ videos|length }} results</h3>

  <div class="container mt-4">
  <h5>{{ videos|length }} results found</h5>

  <div class="row">
    {% for video in videos %}
  <div class="card mb-3">
    <div class="card-body">
      <h5>{{ video.title }}</h5>
      <iframe width="100%" height="315" 
              src="{{ video.filename }}" 
              frameborder="0" allowfullscreen></iframe>
    </div>
  </div>
{% endfor %}

</div>


{% endblock %}
