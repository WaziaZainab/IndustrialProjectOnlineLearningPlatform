<h2>Your Quiz Results</h2>
<table class="table">
    <thead>
        <tr>
            <th>Quiz</th>
            <th>Score</th>
            <th>Total Questions</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for result in results %}
        <tr>
            <td>{{ result.quiz.title }}</td>
            <td>{{ result.score }}</td>
            <td>{{ result.total }}</td>
            <td>{{ result.timestamp.strftime("%Y-%m-%d %H:%M") }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
